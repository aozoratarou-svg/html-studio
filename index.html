<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="HTML STUDIO">
    
    <title>8-BIT HTML STUDIO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent-color: #e52521;
            --link-color: #0055aa;
            --code-color: #33ff33;
            --border-style: 4px solid #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'DotGothic16', sans-serif;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            /* iOSの余計なスクロールやバウンスを抑える */
            overscroll-behavior-y: none;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            color: var(--accent-color);
            text-shadow: 2px 2px 0 #fff;
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }

        .tab-btn {
            flex: 1;
            background-color: var(--bg-color);
            color: var(--text-color);
            border: var(--border-style);
            font-family: 'DotGothic16', sans-serif;
            padding: 10px 5px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 2px 2px 0px #888;
        }

        .tab-btn.active {
            background-color: var(--text-color);
            color: var(--bg-color);
        }

        .panel {
            display: none;
            border: var(--border-style);
            padding: 10px;
            margin-bottom: 15px;
            /* パネルの高さを少し小さくしました */
            height: 40vh;
            box-sizing: border-box;
        }

        .panel.active {
            display: flex;
            flex-direction: column;
        }

        /* ツールバー（右寄せに変更） */
        .editor-toolbar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
        }

        .tool-btn {
            background-color: #444;
            color: var(--text-color);
            border: 2px solid #fff;
            font-family: 'DotGothic16', sans-serif;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .tool-btn:active {
            background-color: #666;
        }

        textarea {
            width: 100%;
            flex-grow: 1;
            background-color: var(--bg-color);
            color: var(--code-color);
            border: none;
            font-family: 'DotGothic16', monospace;
            font-size: 1rem;
            resize: none;
            outline: none;
            box-sizing: border-box;
        }

        iframe {
            width: 100%;
            height: 100%;
            background-color: #fff;
            border: none;
        }

        .config-item {
            margin-bottom: 15px;
        }
        
        .config-item label {
            display: block;
            margin-bottom: 5px;
        }

        .config-item input, .custom-file-input {
            width: 100%;
            padding: 8px;
            background-color: #222;
            color: #fff;
            border: 2px solid #fff;
            font-family: 'DotGothic16', sans-serif;
            box-sizing: border-box;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .action-row {
            display: flex;
            gap: 5px;
            align-items: stretch;
        }

        .action-btn {
            background-color: var(--accent-color);
            color: var(--text-color);
            border: var(--border-style);
            font-family: 'DotGothic16', sans-serif;
            padding: 10px 5px;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 4px 4px 0px #888;
            flex: 2;
        }

        .action-btn.link-btn {
            background-color: var(--link-color);
            flex: 1;
        }

        .action-btn:active {
            box-shadow: inset 4px 4px 0px #888;
            transform: translate(2px, 2px);
        }

        .system-msg {
            color: yellow;
            font-size: 0.8rem;
            margin-top: 10px;
        }

        .section-label {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 5px;
        }

    </style>
</head>
<body>

    <h1>HTML STUDIO</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('edit')">🔨つくる</button>
        <button class="tab-btn" onclick="switchTab('preview')">👁みる</button>
        <button class="tab-btn" onclick="switchTab('config')">⚙️せってい</button>
    </div>

    <div id="panel-edit" class="panel active">
        <div class="editor-toolbar">
            <button class="tool-btn" onclick="clearEditor()">🗑️ クリア</button>
        </div>
        <textarea id="code-editor" placeholder="ここに HTML を にゅうりょく してね！"></textarea>
    </div>

    <div id="panel-preview" class="panel" style="display: none;">
        <iframe id="preview-frame"></iframe>
    </div>

    <div id="panel-config" class="panel" style="display: none; overflow-y: auto;">
        <div class="config-item">
            <label>GITHUB トークン (PAT)</label>
            <input type="password" id="gh-token" placeholder="ghp_xxxxxxxx...">
        </div>
        <div class="config-item">
            <label>ユーザー名 (Owner)</label>
            <input type="text" id="gh-owner" placeholder="例: octocat">
        </div>
        <div class="config-item">
            <label>リポジトリ名 (Repo)</label>
            <input type="text" id="gh-repo" placeholder="例: my-website">
        </div>
        <p class="system-msg">※にゅうりょくした じょうほうは ブラウザに ほぞん されます。</p>
    </div>

    <div class="actions">
        <div class="action-row">
            <button class="action-btn" onclick="saveToGitHub('test.html')">💾 TESTセーブ</button>
            <button class="action-btn link-btn" onclick="openPage('test.html')">🌍 ひらく</button>
        </div>

        <div>
            <div class="section-label">▼ ほんばん用 (なまえをきめる)</div>
            <input type="text" id="custom-filename" class="custom-file-input" placeholder="例: app1.html または tool/index.html" style="margin-bottom: 5px;">
            <div class="action-row">
                <button class="action-btn" onclick="saveCustom()">💾 セーブ</button>
                <button class="action-btn link-btn" onclick="openCustom()">🌍 ひらく</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('gh-token').value = localStorage.getItem('ghToken') || '';
            document.getElementById('gh-owner').value = localStorage.getItem('ghOwner') || '';
            document.getElementById('gh-repo').value = localStorage.getItem('ghRepo') || '';
            document.getElementById('code-editor').value = localStorage.getItem('savedCode') || '';
            document.getElementById('custom-filename').value = localStorage.getItem('lastCustomFile') || '';
        });

        document.getElementById('gh-token').addEventListener('input', (e) => localStorage.setItem('ghToken', e.target.value));
        document.getElementById('gh-owner').addEventListener('input', (e) => localStorage.setItem('ghOwner', e.target.value));
        document.getElementById('gh-repo').addEventListener('input', (e) => localStorage.setItem('ghRepo', e.target.value));
        document.getElementById('code-editor').addEventListener('input', (e) => localStorage.setItem('savedCode', e.target.value));
        document.getElementById('custom-filename').addEventListener('input', (e) => localStorage.setItem('lastCustomFile', e.target.value));

        function clearEditor() {
            if(confirm('かきかけの コードを ぜんぶ けしますか？')) {
                document.getElementById('code-editor').value = '';
                localStorage.setItem('savedCode', '');
            }
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active'));
            
            document.querySelectorAll('.panel').forEach(panel => panel.style.display = 'none');

            if (tabName === 'edit') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                const panel = document.getElementById('panel-edit');
                panel.classList.add('active');
                panel.style.display = 'flex';
            } else if (tabName === 'preview') {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                const panel = document.getElementById('panel-preview');
                panel.classList.add('active');
                panel.style.display = 'block';
                const code = document.getElementById('code-editor').value;
                document.getElementById('preview-frame').srcdoc = code;
            } else if (tabName === 'config') {
                document.querySelectorAll('.tab-btn')[2].classList.add('active');
                const panel = document.getElementById('panel-config');
                panel.classList.add('active');
                panel.style.display = 'block';
            }
        }

        function openCustom() {
            let filename = document.getElementById('custom-filename').value.trim();
            if(!filename) {
                alert('【エラー】\nファイルめいを にゅうりょく してね！');
                return;
            }
            openPage(filename);
        }

        function saveCustom() {
            let filename = document.getElementById('custom-filename').value.trim();
            if(!filename) {
                alert('【エラー】\nファイルめいを にゅうりょく してね！');
                return;
            }
            saveToGitHub(filename);
        }

        function openPage(filename) {
            const owner = document.getElementById('gh-owner').value;
            const repo = document.getElementById('gh-repo').value;
            
            if(!owner || !repo) {
                alert('【エラー】\n「⚙️せってい」で ユーザー名と リポジトリ名を いれてね！');
                return;
            }

            const url = `https://${owner}.github.io/${repo}/${filename}`;
            window.open(url, '_blank');
        }

        async function saveToGitHub(filename) {
            const token = document.getElementById('gh-token').value;
            const owner = document.getElementById('gh-owner').value;
            const repo = document.getElementById('gh-repo').value;
            const content = document.getElementById('code-editor').value;

            if(!token || !owner || !repo) {
                alert('【エラー】\n「⚙️せってい」から GitHubの じょうほうを にゅうりょく してね！');
                return;
            }

            const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${filename}`;
            
            const encodedContent = btoa(unescape(encodeURIComponent(content)));

            try {
                let sha = null;
                const getRes = await fetch(apiUrl, {
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (getRes.ok) {
                    const data = await getRes.json();
                    sha = data.sha;
                }

                const body = {
                    message: `📝 ${filename} を更新 (via 8-BIT STUDIO)`,
                    content: encodedContent
                };
                if (sha) {
                    body.sha = sha;
                }

                const putRes = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });

                if (putRes.ok) {
                    alert(`【せいこう！】\n${filename} に セーブ しました。\nすこし まってから「🌍 ひらく」ボタンを おしてね！`);
                } else {
                    const errData = await putRes.json();
                    alert(`【エラー！】\nセーブに しっぱい しました。\nりゆう: ${errData.message}`);
                }
            } catch (error) {
                alert(`【つうしんエラー！】\nネットワークを かくにん してね。\n${error}`);
            }
        }
    </script>
</body>
</html>
