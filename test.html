<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="8Test">
    
    <title>8Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'DotGothic16', sans-serif;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            overscroll-behavior: none; /* スクロール時のバウンス防止 */
            height: 100vh;
        }
        .nes-container {
            border: 4px solid #fff;
            background: #000;
        }
        .panel-hidden {
            background: #222;
            border: 2px dashed #666;
        }
        .panel-open {
            background: #1a1a2e;
            border: 2px solid #4ecca3;
        }
        .btn-pixel {
            border: 4px solid #fff;
            background: #000;
        }
    </style>
</head>
<body class="flex flex-col items-center p-4">

    <div class="w-full max-w-md mb-6 flex justify-between items-center border-b-2 border-white pb-2 pt-10">
        <div id="home-btn" class="cursor-pointer"> [HOME] </div>
        <div class="text-xl">TRIALS</div>
        <div id="progress">01/10 SET</div>
    </div>

    <div id="trial-container" class="w-full max-w-md space-y-4"></div>

    <div class="fixed bottom-10 flex space-x-8">
        <button id="prev-btn" class="btn-pixel px-6 py-2 text-red-500">BACK</button>
        <button id="next-btn" class="btn-pixel px-6 py-2 text-green-500">NEXT</button>
    </div>

    <script type="module">
        // 本番ではここに「金のフレーズ」から抽出したデータを流し込みます
        const dummyData = [
            { word: "attribute", meaning: "〜のせいにする", example: "He attributes his success to hard work.", pronunciation: "/ətríbjuːt/" },
            { word: "compliance", meaning: "遵守", example: "in compliance with safety regulations", pronunciation: "/kəmpláiəns/" },
            { word: "subscription", meaning: "購読", example: "renew a magazine subscription", pronunciation: "/səbskrípʃən/" },
            { word: "versatile", meaning: "多才な、多目的な", example: "a versatile performer", pronunciation: "/və́ːrsətl/" },
            { word: "expedite", meaning: "早める、促進させる", example: "expedite the process", pronunciation: "/ékspədàit/" },
            { word: "incentive", meaning: "動機、報奨金", example: "a tax incentive", pronunciation: "/inséntiv/" },
        ];

        let currentSetIndex = 0;
        let wordsPerSet = 3;
        let displayWords = [];
        let openedCount = 0;

        function initGame() {
            displayWords = [...dummyData].sort(() => Math.random() - 0.5);
            renderSet();
        }

        function renderSet() {
            const container = document.getElementById('trial-container');
            container.innerHTML = '';
            openedCount = 0;
            
            const startIdx = currentSetIndex * wordsPerSet;
            const currentSet = displayWords.slice(startIdx, startIdx + wordsPerSet);

            // 同じセット内でのシャッフルを適用
            const shuffledSet = [...currentSet].sort(() => Math.random() - 0.5);

            shuffledSet.forEach((item) => {
                const card = document.createElement('div');
                card.className = "nes-container p-4 panel-hidden min-h-[140px] flex flex-col justify-center items-center text-center transition-all";
                card.innerHTML = `
                    <div class="text-2xl mb-2">${item.word}</div>
                    <div class="detail hidden">
                        <div class="text-yellow-400 text-sm mb-1">${item.pronunciation}</div>
                        <div class="text-xl text-green-400 mb-2">${item.meaning}</div>
                        <div class="text-[10px] leading-tight italic text-gray-300 border-t border-gray-700 pt-2 px-2">${item.example}</div>
                    </div>
                `;

                card.onclick = () => {
                    if (card.classList.contains('panel-hidden')) {
                        card.classList.remove('panel-hidden');
                        card.classList.add('panel-open');
                        card.querySelector('.detail').classList.remove('hidden');
                        openedCount++;
                        
                        // 三枚全部開いたら0.5秒後に無言でシャッフル
                        if (openedCount === wordsPerSet) {
                            setTimeout(() => {
                                renderSet(); 
                            }, 500);
                        }
                    }
                };
                container.appendChild(card);
            });

            document.getElementById('progress').innerText = `${currentSetIndex + 1}/${Math.ceil(displayWords.length / wordsPerSet)} SET`;
        }

        // 次のセットへ（手動）
        document.getElementById('next-btn').onclick = () => {
            if ((currentSetIndex + 1) * wordsPerSet < displayWords.length) {
                currentSetIndex++;
                renderSet();
            } else {
                currentSetIndex = 0;
                initGame();
            }
        };

        // 前のセットへ
        document.getElementById('prev-btn').onclick = () => {
            if (currentSetIndex > 0) {
                currentSetIndex--;
                renderSet();
            }
        };

        // ホーム（リロード）
        document.getElementById('home-btn').onclick = () => { location.reload(); };

        initGame();
    </script>
</body>
</html>
