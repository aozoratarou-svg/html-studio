<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC 800 - 三枚の試練</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'DotGothic16', sans-serif;
            image-rendering: pixelated;
        }
        .nes-container {
            border: 4px solid #fff;
            box-shadow: 5px 5px 0px #555;
            background: #000;
        }
        .panel-hidden {
            background: #222;
            border: 2px dashed #666;
            cursor: pointer;
        }
        .panel-open {
            background: #1a1a2e;
            border: 2px solid #4ecca3;
        }
        .btn-pixel {
            padding: 8px 16px;
            border: 4px solid #fff;
            background: #000;
            transition: all 0.1s;
        }
        .btn-pixel:active {
            transform: translate(2px, 2px);
            box-shadow: none;
        }
    </style>
</head>
<body class="flex flex-col items-center p-4">

    <div class="w-full max-w-md mb-6 flex justify-between items-center border-b-2 border-white pb-2">
        <div id="home-btn" class="cursor-pointer"> < HOME </div>
        <div class="text-xl">TOEIC 800: TRIAL</div>
        <div id="progress">01/10 SET</div>
    </div>

    <div id="trial-container" class="w-full max-w-md space-y-4">
        </div>

    <div class="fixed bottom-10 flex space-x-8">
        <button id="prev-btn" class="btn-pixel text-red-500">BACK</button>
        <button id="next-btn" class="btn-pixel text-green-500">NEXT ></button>
    </div>

    <script type="module">
        // 仮のデータ（本来は「金のフレーズ」から抽出したデータを入れる）
        const dummyData = [
            { word: "attribute", meaning: "〜のせいにする", example: "He attributes his success to hard work.", pronunciation: "/ətríbjuːt/" },
            { word: "compliance", meaning: "遵守", example: "in compliance with safety regulations", pronunciation: "/kəmpláiəns/" },
            { word: "subscription", meaning: "購読", example: "renew a magazine subscription", pronunciation: "/səbskrípʃən/" },
            { word: "versatile", meaning: "多才な、多目的な", example: "a versatile performer", pronunciation: "/və́ːrsətl/" },
            { word: "expedite", meaning: "早める、促進させる", example: "expedite the process", pronunciation: "/ékspədàit/" },
            { word: "incentive", meaning: "動機、報奨金", example: "a tax incentive", pronunciation: "/inséntiv/" },
        ];

        let currentSetIndex = 0;
        let wordsPerSet = 3;
        let displayWords = [];

        function initGame() {
            // シャッフルして30問（ここでは仮に全データ）をセット
            displayWords = [...dummyData].sort(() => Math.random() - 0.5);
            renderSet();
        }

        function renderSet() {
            const container = document.getElementById('trial-container');
            container.innerHTML = '';
            
            const startIdx = currentSetIndex * wordsPerSet;
            const currentSet = displayWords.slice(startIdx, startIdx + wordsPerSet);

            currentSet.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = "nes-container p-4 panel-hidden min-h-[120px] flex flex-col justify-center items-center text-center transition-all";
                card.innerHTML = `
                    <div class="text-2xl mb-2">${item.word}</div>
                    <div class="detail hidden">
                        <div class="text-yellow-400 text-sm mb-1">${item.pronunciation}</div>
                        <div class="text-xl text-green-400 mb-2">${item.meaning}</div>
                        <div class="text-xs italic text-gray-300 border-t border-gray-700 pt-2">${item.example}</div>
                    </div>
                `;

                card.onclick = () => {
                    card.classList.remove('panel-hidden');
                    card.classList.add('panel-open');
                    card.querySelector('.detail').classList.remove('hidden');
                    playAudio(item.word);
                };

                container.appendChild(card);
            });

            document.getElementById('progress').innerText = `${currentSetIndex + 1}/${Math.ceil(displayWords.length / wordsPerSet)} SET`;
        }

        function playAudio(word) {
            console.log(`Playing audio for: ${word}`);
            // ここに Audio オブジェクトの再生処理を入れる
            // const audio = new Audio(`audio/${word}.mp3`);
            // audio.play();
        }

        document.getElementById('next-btn').onclick = () => {
            if ((currentSetIndex + 1) * wordsPerSet < displayWords.length) {
                currentSetIndex++;
                renderSet();
            } else {
                alert("全ての試練を終えた！再シャッフルします。");
                currentSetIndex = 0;
                initGame();
            }
        };

        document.getElementById('prev-btn').onclick = () => {
            if (currentSetIndex > 0) {
                currentSetIndex--;
                renderSet();
            }
        };

        document.getElementById('home-btn').onclick = () => {
            if(confirm("ホームに戻りますか？")) location.reload();
        };

        initGame();
    </script>
</body>
</html>
