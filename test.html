<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS IoT Quest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent-color: #f8b800; /* ファミコン風の黄色 */
            --border-color: #ffffff;
            --line-color: #44aaff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'DotGothic16', sans-serif;
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
            user-select: none;
        }

        h1 {
            text-align: center;
            font-size: 1.2rem;
            border: 4px double var(--border-color);
            padding: 10px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0 #888;
        }

        #tree-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 50px;
        }

        #svg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* ツリーレイアウト */
        .level {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 50px;
            position: relative;
            z-index: 10;
        }

        .node {
            background-color: var(--bg-color);
            border: 4px double var(--border-color);
            padding: 10px;
            border-radius: 8px; /* 少しの丸み */
            text-align: center;
            cursor: pointer;
            box-shadow: 4px 4px 0 #555;
            min-width: 120px;
            max-width: 90%;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .node:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #555;
        }

        .node-title {
            font-size: 1.1rem;
            color: var(--accent-color);
            margin-bottom: 5px;
        }

        .node-tags {
            font-size: 0.7rem;
            color: #aaa;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px;
        }

        .tag {
            border: 1px solid #aaa;
            padding: 2px 4px;
            border-radius: 4px;
        }

        /* モーダル (RPG風メッセージウィンドウ) */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
        }

        #modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 400px;
            background-color: var(--bg-color);
            border: 6px double var(--border-color);
            padding: 20px;
            z-index: 1000;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        #modal h2 {
            margin-top: 0;
            color: var(--accent-color);
            font-size: 1.2rem;
            border-bottom: 2px dashed #555;
            padding-bottom: 10px;
        }

        #modal p {
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .term-list {
            background: #111;
            padding: 10px;
            border: 1px solid #444;
            margin-bottom: 15px;
            font-size: 0.8rem;
        }

        .term-list dt {
            color: #4af;
            font-weight: bold;
            margin-top: 5px;
        }

        .term-list dd {
            margin: 0 0 5px 10px;
            color: #ccc;
        }

        .close-btn {
            display: block;
            width: 100%;
            background: transparent;
            color: var(--text-color);
            border: 2px solid var(--border-color);
            padding: 10px;
            font-family: inherit;
            cursor: pointer;
            text-align: center;
            font-size: 1rem;
        }
        .close-btn:active {
            background: #333;
        }

        /* 点滅カーソル */
        .cursor {
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <h1>▼ AWS IoT クエスト ▼<br><span style="font-size:0.7rem; color:#aaa;">〜エッジからクラウドへの旅〜</span></h1>

    <div id="tree-wrapper">
        <svg id="svg-canvas"></svg>

        <div class="level" id="level-1">
            <div class="node" id="node-device" onclick="showModal('device')">
                <div class="node-title">エッジデバイス</div>
                <div class="node-tags">
                    <span class="tag">センサー</span><span class="tag">Publisher</span><span class="tag">JSON</span>
                </div>
            </div>
        </div>

        <div class="level" id="level-2">
            <div class="node" id="node-gg" onclick="showModal('greengrass')">
                <div class="node-title">AWS IoT Greengrass</div>
                <div class="node-tags">
                    <span class="tag">エッジ処理</span><span class="tag">オフライン稼働</span>
                </div>
            </div>
        </div>

        <div class="level" id="level-3">
            <div class="node" id="node-core" onclick="showModal('core')">
                <div class="node-title">AWS IoT Core</div>
                <div class="node-tags">
                    <span class="tag">MQTTブローカー</span><span class="tag">Device Shadow</span><span class="tag">ルールエンジン</span>
                </div>
            </div>
        </div>

        <div class="level" id="level-4">
            <div class="node" id="node-s3" onclick="showModal('s3')">
                <div class="node-title">Amazon S3<br>/ DynamoDB</div>
                <div class="node-tags"><span class="tag">データ蓄積</span></div>
            </div>
            <div class="node" id="node-lambda" onclick="showModal('lambda')">
                <div class="node-title">AWS Lambda<br>/ SNS</div>
                <div class="node-tags"><span class="tag">分析・アラート</span></div>
            </div>
        </div>

        <div class="level" id="level-5">
            <div class="node" id="node-user" onclick="showModal('user')">
                <div class="node-title">最終ユーザー / App</div>
                <div class="node-tags">
                    <span class="tag">予知保全</span><span class="tag">遠隔操作</span><span class="tag">Subscriber</span>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-overlay" onclick="closeModal()"></div>
    <div id="modal" style="display:none;">
        <h2 id="modal-title">タイトル</h2>
        <p id="modal-desc"></p>
        <dl class="term-list" id="modal-terms" style="display:none;"></dl>
        <button class="close-btn" onclick="closeModal()">とじる <span class="cursor">▼</span></button>
    </div>

    <script>
        // --- データ定義 ---
        const data = {
            'device': {
                title: 'エッジデバイス (現場の機器)',
                desc: '工場や設備のセンサー、モーターなどのIoT機器。現場の物理データを取得し、デジタルデータに変換してクラウドへ送る冒険の出発点だ！',
                terms: {
                    'JSON (ジェイソン)': 'データを送る際の標準的なフォーマット。{"温度": 25.5, "状態": "正常"} のように、軽量でプログラムが読みやすい。',
                    'Publisher (パブリッシャー)': 'データの発信者のこと。センサーが温度データを「出版(Publish)」する役割を担う。',
                    'MQTT': 'IoTでよく使われる軽量な通信規格。回線が不安定な移動中のネットワーク等でも確実にデータを送れるスグレモノ。'
                }
            },
            'greengrass': {
                title: 'AWS IoT Greengrass',
                desc: '現場（エッジ）に設置するゲートウェイ用ソフトウェア。クラウドの知能を現場に持ち込み、通信が切れてもローカルで自律的に動くことができる！',
                terms: {
                    'エッジコンピューティング': 'すべてのデータをクラウドに送らず、現場(エッジ)でフィルタリングや一次分析を行うことで、通信量と遅延を減らす技術。',
                    'オフライン稼働': 'インターネットが切断されても、ローカル内でデバイス同士を連携させ、データを保持し続ける機能。'
                }
            },
            'core': {
                title: 'AWS IoT Core',
                desc: '数十億のデバイスとAWSを安全につなぐ巨大な関所(マネージドサービス)。送られてきたデータをさばき、各AWSサービスへと振り分ける心臓部だ。',
                terms: {
                    'MQTTブローカー': '無数のPublisher(送信者)とSubscriber(受信者)の間に入り、適切にメッセージを中継する郵便局のような役割。',
                    'Device Shadow': 'デバイスの「影(最新状態)」をクラウド上に保持する機能。デバイスがオフラインでも、アプリは影を見て状態を確認・変更できる。',
                    'ルールエンジン': '「温度が30度を超えたらLambdaを起動する」といったSQL風の条件式で、データを後続のサービスに自動ルーティングする機能。'
                }
            },
            's3': {
                title: 'S3 / DynamoDB (データ保存)',
                desc: 'IoT Coreから送られてきた膨大なデータを保管する宝物庫。',
                terms: {
                    'Amazon S3': '容量無制限のストレージ。過去数年分の大量のセンサーデータを「データレイク」として安価に保存し、AIの学習データなどに使う。',
                    'Amazon DynamoDB': '超高速なNoSQLデータベース。現在の最新ステータスや、素早く検索したい「ホットデータ」の保存に使う。'
                }
            },
            'lambda': {
                title: 'Lambda / SNS (アクション)',
                desc: '異常を検知した際に、自動的に呪文(プログラム)を唱えたり、人間に知らせたりするアクション部隊だ。',
                terms: {
                    'AWS Lambda': 'サーバーを意識せずにコードを実行できるサービス。異常値の判定や、データフォーマットの変換ロジックを担う。',
                    'Amazon SNS': '異常を検知した際に、管理者のスマホにSMSやメールで「アラート(警告)」をプッシュ通知する。'
                }
            },
            'user': {
                title: '最終ユーザー / アプリケーション',
                desc: '現場から集まり、AWSで分析されたデータを受け取る最終地点。PCのダッシュボードやスマホアプリを通じて、現実世界に価値をもたらす！',
                terms: {
                    'Subscriber (サブスクライバー)': 'データの受信者。スマホアプリがIoT Coreの特定の情報（トピック）を「購読(Subscribe)」して最新情報を受け取る。',
                    '予知保全': '蓄積したセンサーデータとAI分析から「壊れる前に部品の寿命を予測」し、メンテナンスを行うこと。ダウンタイムを劇的に減らせる。',
                    '遠隔操作': 'Device Shadowを通じて、自宅のスマホから遠く離れた工場のバルブを閉めたり、空調を操作したりすること。'
                }
            }
        };

        // --- 描画処理 (SVGでの曲線描画) ---
        function drawTreeLines() {
            const svg = document.getElementById('svg-canvas');
            const wrapper = document.getElementById('tree-wrapper');
            svg.innerHTML = ''; // クリア

            // 接続定義 [from, to]
            const connections = [
                ['node-device', 'node-gg'],
                ['node-gg', 'node-core'],
                ['node-core', 'node-s3'],
                ['node-core', 'node-lambda'],
                ['node-s3', 'node-user'],
                ['node-lambda', 'node-user']
            ];

            const wrapperRect = wrapper.getBoundingClientRect();

            connections.forEach(conn => {
                const el1 = document.getElementById(conn[0]);
                const el2 = document.getElementById(conn[1]);
                if(!el1 || !el2) return;

                const rect1 = el1.getBoundingClientRect();
                const rect2 = el2.getBoundingClientRect();

                // wrapper基準の座標計算
                const x1 = rect1.left + rect1.width / 2 - wrapperRect.left;
                const y1 = rect1.top + rect1.height / 2 - wrapperRect.top;
                const x2 = rect2.left + rect2.width / 2 - wrapperRect.left;
                const y2 = rect2.top + rect2.height / 2 - wrapperRect.top;

                // SVGパスの生成 (ベジェ曲線)
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                // 下へ向かう曲線
                const d = `M ${x1} ${y1} C ${x1} ${(y1+y2)/2}, ${x2} ${(y1+y2)/2}, ${x2} ${y2}`;
                
                path.setAttribute('d', d);
                path.setAttribute('stroke', 'var(--line-color)');
                path.setAttribute('stroke-width', '4');
                path.setAttribute('stroke-dasharray', '8 4'); // 点線で通信っぽく
                path.setAttribute('fill', 'none');
                
                // アニメーション用にクラス追加
                const style = document.createElementNS('http://www.w3.org/2000/svg', 'style');
                style.textContent = `
                    @keyframes dash { to { stroke-dashoffset: -24; } }
                    path { animation: dash 1s linear infinite; }
                `;
                svg.appendChild(style);
                svg.appendChild(path);
            });
        }

        // --- モーダル制御 ---
        let typeInterval;

        function showModal(id) {
            const info = data[id];
            if (!info) return;

            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById('modal').style.display = 'block';
            
            document.getElementById('modal-title').innerText = info.title;
            
            // 用語リストの構築
            const termsEl = document.getElementById('modal-terms');
            termsEl.innerHTML = '';
            if (info.terms && Object.keys(info.terms).length > 0) {
                termsEl.style.display = 'block';
                for (let key in info.terms) {
                    termsEl.innerHTML += `<dt>▶ ${key}</dt><dd>${info.terms[key]}</dd>`;
                }
            } else {
                termsEl.style.display = 'none';
            }

            // RPG風文字送りアニメーション
            const descEl = document.getElementById('modal-desc');
            descEl.innerHTML = '';
            clearInterval(typeInterval);
            let i = 0;
            const text = info.desc;
            
            typeInterval = setInterval(() => {
                descEl.innerHTML += text.charAt(i);
                i++;
                if (i >= text.length) {
                    clearInterval(typeInterval);
                }
            }, 30); // 文字送りの速度
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('modal').style.display = 'none';
            clearInterval(typeInterval);
        }

        // 初期化とリサイズイベント
        window.addEventListener('load', drawTreeLines);
        window.addEventListener('resize', drawTreeLines);
        
        // フォント読み込み完了後にもう一度描画（ズレ防止）
        document.fonts.ready.then(function() {
            drawTreeLines();
        });

    </script>
</body>
</html>
