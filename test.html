<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone Canvas Girl</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #333; }
        canvas { border: 2px solid #fff; background-color: #eee; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="320" height="480"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // --- 1. 画像素材（同じGitHubにあるファイル） ---
        const girlImg = new Image();
        // ここで同じフォルダのgirl.pngを指す
        girlImg.src = 'girl.png'; 

        // --- 2. キャラの状態 ---
        const hero = { x: canvas.width/2 - 25, y: canvas.height/2 - 25, width: 50, height: 50, speed: 10 };

        // --- 3. 描画処理 ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); // 画面クリア
            if (girlImg.complete) {
                // 画像を描画（カットされた画像に合わせてサイズを微調整）
                ctx.drawImage(girlImg, hero.x, hero.y, hero.width, hero.height);
            }
        }

        // --- 4. 移動処理 ---
        function move(direction) {
            if (direction === 'up') hero.y -= hero.speed;
            if (direction === 'down') hero.y += hero.speed;
            if (direction === 'left') hero.x -= hero.speed;
            if (direction === 'right') hero.x += hero.speed;
            // 画面外判定
            if (hero.x < 0) hero.x = 0;
            if (hero.x > canvas.width - hero.width) hero.x = canvas.width - hero.width;
            if (hero.y < 0) hero.y = 0;
            if (hero.y > canvas.height - hero.height) hero.y = canvas.height - hero.height;
            draw(); // 移動後に再描画
        }

        // --- 5. iPhone用の画面タッチ操作 ---
        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const touchX = touch.clientX - rect.left;
            const touchY = touch.clientY - rect.top;
            
            // タッチした位置に応じて上下左右に移動
            if (touchY < hero.y) move('up');
            if (touchY > hero.y + hero.height) move('down');
            if (touchX < hero.x) move('left');
            if (touchX > hero.x + hero.width) move('right');
            e.preventDefault(); // スクロール防止
        });

        // 初期描画
        girlImg.onload = draw;
    </script>
</body>
</html>
