<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pancake - Recipe & Timer</title>
    <style>
        :root {
            --bg: #ffffff;
            --accent: #d4a373;
            --text: #333333;
            --soft-gold: #fffdfa;
            --gray: #999999;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: "Helvetica Neue", Arial, "Hiragino Sans", sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 5vh 20px;
            line-height: 1.7;
        }

        .container {
            max-width: 400px;
            width: 100%;
        }

        /* Symbolic Pancake Icon */
        .symbol {
            width: 44px;
            height: 22px;
            margin: 0 auto 30px;
            background: var(--accent);
            border-radius: 50% / 80% 80% 20% 20%;
            position: relative;
            box-shadow: 0 4px 0 #bc8a5f;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 300;
            text-align: center;
            letter-spacing: 0.4em;
            margin-bottom: 60px;
            text-transform: uppercase;
        }

        /* Control UI */
        .servings-ui {
            text-align: center;
            margin-bottom: 50px;
            font-size: 0.9rem;
            color: var(--gray);
        }

        input[type="number"] {
            width: 45px;
            border: none;
            border-bottom: 1px solid var(--accent);
            text-align: center;
            font-size: 1.1rem;
            color: var(--accent);
            outline: none;
            background: transparent;
            font-family: serif;
        }

        .section-label {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: block;
            border-bottom: 1px solid #f0f0f0;
        }

        .ing-list {
            list-style: none;
            padding: 0;
            margin: 0 0 50px 0;
            font-size: 0.9rem;
        }

        .ing-list li {
            padding: 8px 0;
            border-bottom: 1px solid #fafafa;
            display: flex;
            justify-content: space-between;
        }

        .ing-amount {
            font-weight: 500;
            font-family: "Courier New", monospace;
        }

        /* Step Guide */
        .how-to {
            margin-bottom: 50px;
            font-size: 0.85rem;
        }

        .how-to p { margin: 0 0 20px 0; }
        .how-to b { color: var(--accent); font-weight: 600; margin-right: 5px; }

        /* Timer UI */
        .timer-panel {
            background: var(--soft-gold);
            padding: 25px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #f5f0e8;
        }

        #time-left {
            font-size: 2.8rem;
            font-weight: 200;
            color: var(--accent);
            margin: 5px 0 20px 0;
            font-family: "Times New Roman", serif;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: opacity 0.2s;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .btn:active { opacity: 0.6; }

        footer {
            margin-top: 80px;
            text-align: center;
            font-size: 0.55rem;
            color: var(--gray);
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="symbol"></div>
        <h1>Pancake</h1>

        <div class="servings-ui">
            Yield: <input type="number" id="servings" value="1" step="0.5" min="0.5"> Person
        </div>

        <span class="section-label">Ingredients</span>
        <ul class="ing-list">
            <li><span>ホットケーキミックス</span> <span><span class="calc" data-unit="100">100</span> g</span></li>
            <li><span>牛乳</span> <span><span class="calc" data-unit="160">160</span> ml</span></li>
            <li><span>卵</span> <span><span class="calc" data-unit="1">1</span> 個</span></li>
            <li><span>溶かしバター</span> <span><span class="calc" data-unit="15">15</span> g</span></li>
        </ul>

        <span class="section-label">Process</span>
        <div class="how-to">
            <p><b>01.</b> 卵・牛乳・バターを先に混ぜ、最後に粉を。ダマが少し残る程度で混ぜるのを止めます。</p>
            <p><b>02.</b> 20分ほど冷蔵庫で休ませます。これで生地が落ち着き、薄くきれいに広がります。</p>
            <p><b>03.</b> フライパンを熱し、一度「濡れ布巾」で冷まします。弱火で生地を薄く流し入れます。</p>
        </div>

        <div class="timer-panel">
            <span class="section-label" style="border:none">Timer</span>
            <div id="time-left">01:00</div>
            <div class="btn-group">
                <button class="btn btn-outline" onclick="initTimer(60)">表面 60s</button>
                <button class="btn btn-outline" onclick="initTimer(30)">裏面 30s</button>
                <button class="btn" id="toggle-btn" onclick="toggle()">START</button>
            </div>
        </div>

        <footer>
            DYNAMICAL CALCULATOR & TIMER / VER. 2026
        </footer>
    </div>

    <script>
        // Calculation Logic
        const input = document.getElementById('servings');
        const calcs = document.querySelectorAll('.calc');

        function update() {
            const val = parseFloat(input.value) || 0;
            calcs.forEach(el => {
                const base = parseFloat(el.getAttribute('data-unit'));
                el.textContent = Math.round(base * val * 10) / 10;
            });
        }
        input.addEventListener('input', update);

        // Timer Logic
        let seconds = 60;
        let running = null;
        const display = document.getElementById('time-left');
        const btn = document.getElementById('toggle-btn');

        function draw() {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            display.textContent = `${m}:${s}`;
        }

        function initTimer(sec) {
            stop();
            seconds = sec;
            draw();
        }

        function stop() {
            clearInterval(running);
            running = null;
            btn.textContent = 'START';
        }

        function toggle() {
            if (running) {
                stop();
            } else {
                btn.textContent = 'STOP';
                running = setInterval(() => {
                    seconds--;
                    draw();
                    if (seconds <= 0) {
                        stop();
                        alert('Time is up!');
                    }
                }, 1000);
            }
        }
    </script>
</body>
</html>
